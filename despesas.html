<script>
(function protegerPagina(){
  const auth = sessionStorage.getItem("painel_board_auth");
  const loginTime = Number(sessionStorage.getItem("painel_board_login_time"));
  const agora = Date.now();
  const LIMITE_TEMPO = 60 * 60 * 1000;

  if(auth !== "ok" || !loginTime || (agora - loginTime) > LIMITE_TEMPO){
    sessionStorage.clear();
    window.location.href = "login.html";
  }
})();
</script>

<div id="app" class="loading">A carregar despesas...</div>

<script>
function logout(){
  sessionStorage.clear();
  window.location.href = "login.html";
}

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=263297811&single=true&output=csv";

function parseCSV(text){
  const rows=[];
  let row=[];
  let cell="";
  let insideQuotes=false;

  for(let i=0;i<text.length;i++){
    const char=text[i];
    const next=text[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      cell+='"';
      i++;
    }else if(char === '"'){
      insideQuotes=!insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(cell.trim());
      cell="";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(cell !== "" || row.length > 0){
        row.push(cell.trim());
        rows.push(row);
        row=[];
        cell="";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      cell+=char;
    }
  }

  if(cell !== "" || row.length > 0){
    row.push(cell.trim());
    rows.push(row);
  }

  return rows;
}

function clean(v){
  return v ? String(v).trim() : "";
}

function norm(v){
  return clean(v)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .toUpperCase();
}

function isSection(row){
  const txt=norm(row.join(" "));
  return (
    txt.includes("DESPESAS PRIORITARIAS") ||
    txt.includes("PAGAMENTO DE MEDICOS") ||
    txt.includes("CONVERSAO DE FERIAS") ||
    txt.includes("DESPESAS CORRENTES")
  );
}

function isSubtotal(row){
  return norm(row.join(" ")).includes("SUB-TOTAL");
}

function isTotal(row){
  return norm(row.join(" ")).includes("TOTAL GERAL");
}

function firstFilled(row){
  return row.find(c => clean(c) !== "") || "";
}

function renderTable(rows){
  let html=`
  <table>
    <colgroup>
      <col class="col-item">
      <col class="col-desc">
      <col class="col-resp">
      <col class="col-ent">
      <col class="col-lim">
      <col class="col-valor">
    </colgroup>
    <thead>
      <tr>
        <th>Item</th>
        <th>Descricao</th>
        <th>Responsavel</th>
        <th>D. DE ENTRADA</th>
        <th>DATA LIMITE</th>
        <th>Valor</th>
      </tr>
    </thead>
    <tbody>
  `;

  for(const r of rows){
    if(!r || r.every(c => !clean(c))) continue;

    const joined=norm(r.join(" "));

    if(joined.includes("ITEM") && joined.includes("DESCRICAO") && joined.includes("VALOR")) continue;
    if(joined.includes("RELACAO DE DESPESAS")) continue;

    if(isSection(r)){
      html+=`
      <tr class="section-row">
        <td></td>
        <td colspan="5">${firstFilled(r)}</td>
      </tr>`;
      continue;
    }

    if(isSubtotal(r)){
      const valor = clean(r[r.length - 1]);
      html+=`
      <tr class="subtotal-row">
        <td colspan="5" class="subtotal-label">SUB-TOTAL</td>
        <td class="valor">${valor}</td>
      </tr>`;
      continue;
    }

    if(isTotal(r)){
      const valor = clean(r[r.length - 1]);
      html+=`
      <tr class="total-row">
        <td colspan="5" class="total-label">TOTAL GERAL</td>
        <td class="total-value">${valor}</td>
      </tr>`;
      continue;
    }

    const item=clean(r[0]);
    const desc=clean(r[1]);
    const resp=clean(r[2]);
    const entrada=clean(r[3]);
    const limite=clean(r[4]);
    const valor=clean(r[5]);

    html+=`
    <tr>
      <td class="center">${item}</td>
      <td class="${desc.length > 35 ? 'desc-small' : ''}">${desc}</td>
      <td class="center">${resp}</td>
      <td class="center">${entrada}</td>
      <td class="center">${limite}</td>
      <td class="valor">${valor}</td>
    </tr>`;
  }

  html+=`
    </tbody>
  </table>`;

  return html;
}

async function carregarDespesas(){
  const app=document.getElementById("app");

  try{
    const resp=await fetch(CSV_URL + "&t=" + Date.now(), {
      cache:"no-store"
    });

    if(!resp.ok) throw new Error("Erro HTTP: " + resp.status);

    const text=await resp.text();

    if(!text || text.length < 10){
      throw new Error("CSV vazio");
    }

    const rows=parseCSV(text);

    app.className="";
    app.innerHTML=renderTable(rows);

  }catch(e){
    console.error("ERRO REAL:", e);
    app.className="error";
    app.innerHTML="Erro ao carregar despesas. Verifique se o Google Sheet está publicado.";
  }
}

carregarDespesas();
</script>
