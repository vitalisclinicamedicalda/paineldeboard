<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa de Devedores</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:#fff;
  color:#000;
  padding:8px;
  font-size:11px;
}

.logo{height:55px}

.nav-buttons{
  position:absolute;
  top:13px;
  left:540px;
  display:flex;
  gap:65px;
}

.nav-btn{
  min-width:130px;
  height:28px;
  padding:6px 14px;
  border:2px solid #e5392d;
  border-radius:6px;
  background:#fff;
  color:#000;
  text-decoration:none;
  font-size:11px;
  font-weight:bold;
  text-align:center;
}

.nav-btn:hover,.nav-btn.active{
  background:#e5392d;
  color:#fff;
}

.title{
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-top:-10px;
}

.data{
  text-align:center;
  font-size:13px;
  font-weight:bold;
  margin:4px 0 10px;
}

table{
  border-collapse:collapse;
  table-layout:fixed;
}

.main-table{
  width:100%;
}

th,td{
  border:1px solid #000;
  padding:2px 3px;
  height:20px;
  text-align:center;
  vertical-align:middle;
  white-space:nowrap;
}

th{font-weight:bold}

.left{text-align:left}
.bold{font-weight:bold}
.italic{font-style:italic}
.green{color:#00b050}
.red{color:#c00000}

.group td,
.subtotal td,
.total td{
  font-weight:bold;
  border-top:2px solid #000;
  border-bottom:2px solid #000;
}

.group td:nth-child(2){
  font-style:italic;
  text-align:left;
}

.summary{
  width:500px;
  margin-top:14px;
  font-size:14px;
}

.summary td{
  border:none;
  border-bottom:1px solid #000;
  text-align:left;
  height:24px;
  padding:2px 4px;
}

.summary td:first-child{
  width:70%;
  font-weight:bold;
}

.summary td:last-child{
  width:30%;
  text-align:right;
}

.loading{
  text-align:center;
  padding:30px;
  font-size:15px;
}

@media print{
  @page{
    size:A4 landscape;
    margin:4mm;
  }

  body{
    padding:0;
    zoom:0.72;
  }

  .nav-buttons{
    display:none;
  }

  .logo{
    height:42px;
  }

  table{
    page-break-inside:avoid;
  }
}
</style>
</head>

<body>

<img src="vitalis-logo.png" class="logo">

<div class="nav-buttons">
  <a href="index.html" class="nav-btn">Saldos</a>
  <a href="despesas.html" class="nav-btn">Mapa de Despesas</a>
  <a href="devedores.html" class="nav-btn active">Mapa de Devedores</a>
  <a href="erdm.html" class="nav-btn">Extrato ERDM</a>
</div>

<div class="title">MAPA DE DEVEDORES</div>
<div id="dataMapa" class="data"></div>

<div id="app" class="loading">A carregar mapa de devedores...</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=2114637149&single=true&output=csv";

function parseCSV(text){
  const rows=[];
  let row=[],cell="",q=false;

  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];

    if(ch=='"' && q && next=='"'){
      cell+='"';
      i++;
    }else if(ch=='"'){
      q=!q;
    }else if(ch=="," && !q){
      row.push(cell.trim());
      cell="";
    }else if((ch=="\n" || ch=="\r") && !q){
      if(cell!=="" || row.length){
        row.push(cell.trim());
        rows.push(row);
        row=[];
        cell="";
      }
      if(ch=="\r" && next=="\n") i++;
    }else{
      cell+=ch;
    }
  }

  if(cell!=="" || row.length){
    row.push(cell.trim());
    rows.push(row);
  }

  return rows;
}

function c(v){
  return v ? String(v).trim() : "";
}

function txt(r){
  return r.join(" ").toUpperCase();
}

function getDate(rows){
  for(const r of rows){
    const joined=r.join(" ");
    const m=joined.match(/DATA[:\s]*([0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4})/i);
    if(m) return "DATA: " + m[1];

    for(const cell of r){
      const d=String(cell).match(/[0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4}/);
      if(d) return "DATA: " + d[0];
    }
  }
  return "";
}

function clsValue(v){
  if(!v || v==="-" ) return "";
  const n=parseFloat(String(v).replace(/,/g,""));
  if(isNaN(n)) return "";
  if(n>=300000) return "green";
  if(n>0 && n<20000) return "red";
  return "";
}

function isUsefulRow(r){
  const t=txt(r);

  if(!r || r.every(x=>!x)) return false;
  if(t.includes("MAPA DE DEVEDORES")) return false;
  if(t.includes("DATA:")) return false;
  if(t.includes("ITEM") && t.includes("PERIODO")) return false;
  if(t.includes("CLIENTE") && t.includes("JANEIRO")) return false;
  if(t.includes("TOTAL EM DÍVIDA") && r.length<8) return false;
  if(t.includes("TOTAL PIO")) return false;
  if(t.includes("TOTAL VALOR EM COBRANÇA")) return false;
  if(t.includes("TOTAL PISO EM COBRANÇA")) return false;

  return true;
}

function render(rows){
  let html=`
<table class="main-table">
<colgroup>
  <col style="width:5%">
  <col style="width:15%">
  <col style="width:8%">
  <col style="width:8.5%">
  <col style="width:8%">
  <col style="width:8.5%">
  <col style="width:8%">
  <col style="width:8.5%">
  <col style="width:8.5%">
  <col style="width:8%">
  <col style="width:11%">
  <col style="width:11%">
</colgroup>

<thead>
<tr>
  <th>ITEM</th>
  <th>PERIODO</th>
  <th>60 Dias</th>
  <th>25-04-2026</th>
  <th>Piso</th>
  <th>25-05-2026</th>
  <th>PISO</th>
  <th>CORRENTE</th>
  <th>50% piso Abril</th>
  <th></th>
  <th rowspan="2">TOTAL EM DÍVIDA</th>
  <th rowspan="2">TOTAL EM COBRANÇA</th>
</tr>
<tr>
  <th></th>
  <th>CLIENTE</th>
  <th>JANEIRO</th>
  <th>FEVEREIRO</th>
  <th></th>
  <th>MARÇO</th>
  <th></th>
  <th>ABRIL</th>
  <th></th>
  <th>MAIO</th>
</tr>
</thead>
<tbody>
`;

  for(const r of rows){
    if(!isUsefulRow(r)) continue;

    const t=txt(r);

    const row=[
      c(r[0]),
      c(r[1]),
      c(r[2]),
      c(r[3]),
      c(r[4]),
      c(r[5]),
      c(r[6]),
      c(r[7]),
      c(r[8]),
      c(r[9]),
      c(r[11]),
      c(r[12])
    ];

    const isGroup=
      t.includes("SEGURADORAS") ||
      t.includes("EMPRESAS PRIVADAS") ||
      t.includes("EMPRESAS PÚBLICAS") ||
      t.includes("EMPRESAS PUBLICAS");

    const isSubtotal=t.includes("SUBTOTAL");
    const isTotal=row[1].toUpperCase()==="TOTAL" || t.startsWith("TOTAL ");

    let trClass="";
    if(isGroup) trClass="group";
    else if(isSubtotal) trClass="subtotal";
    else if(isTotal) trClass="total";

    html+=`<tr class="${trClass}">`;

    row.forEach((val,i)=>{
      let cl="";
      if(i===1) cl+=" left";
      if(isGroup || isSubtotal || isTotal) cl+=" bold";
      if(isGroup && i===1) cl+=" italic";
      cl+=" " + clsValue(val);

      html+=`<td class="${cl}">${val}</td>`;
    });

    html+=`</tr>`;
  }

  html+=`
</tbody>
</table>`;

  return html;
}
function summary(rows){
  let html = `<table class="summary">`;

  let count = 0;

  for(let i = 27; i < rows.length; i++){
    const texto = c(rows[i][0]);
    const valor = c(rows[i][3]);

    if(!texto && !valor) continue;

    html += `
      <tr>
        <td><b>${texto}</b></td>
        <td>${valor}</td>
      </tr>
    `;

    count++;

    // 🔒 LIMITA A 4 LINHAS (igual ao PDF)
    if(count === 4) break;
  }

  html += `</table>`;
  return html;
}

}

async function carregar(){
  const app=document.getElementById("app");

  try{
    const resp=await fetch(CSV_URL + "&t=" + Date.now(), {cache:"no-store"});
    if(!resp.ok) throw new Error("Erro HTTP: " + resp.status);

    const text=await resp.text();
    const rows=parseCSV(text);

    document.getElementById("dataMapa").innerText=getDate(rows);

    app.className="";
    app.innerHTML=render(rows)+summary(rows);

  }catch(e){
    app.className="";
    app.innerHTML="Erro ao carregar mapa de devedores. Verifique se o Google Sheet está publicado.";
    console.error(e);
  }
}

carregar();
</script>

</body>
</html>
