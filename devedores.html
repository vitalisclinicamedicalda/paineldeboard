<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa de Devedores</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#fff;
  color:#000;
  padding:8px 10px;
  font-size:12px;
}

.logo{
  height:55px;
}

.nav-buttons{
  position:absolute;
  top:13px;
  left:540px;
  display:flex;
  gap:65px;
}

.nav-btn{
  min-width:130px;
  height:28px;
  padding:6px 14px;
  border:2px solid #e5392d;
  border-radius:6px;
  background:#fff;
  color:#000;
  text-decoration:none;
  font-size:11px;
  font-weight:bold;
  text-align:center;
}

.nav-btn:hover,.nav-btn.active{
  background:#e5392d;
  color:#fff;
}

.title{
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-top:-12px;
}

.data{
  text-align:center;
  font-size:12px;
  font-weight:bold;
  margin:4px 0 10px;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid #000;
  padding:2px 3px;
  height:21px;
  text-align:center;
  vertical-align:middle;
  white-space:nowrap;
}

th{
  font-weight:bold;
}

.left{text-align:left}
.bold{font-weight:bold}
.italic{font-style:italic}
.green{color:#00b050}
.red{color:#c00000}

.group-row td,
.subtotal-row td,
.total-row td{
  font-weight:bold;
  border-top:2px solid #000;
  border-bottom:2px solid #000;
}

.group-row td:nth-child(2){
  font-style:italic;
  text-align:left;
}

.summary{
  width:380px;
  margin-top:16px;
  font-size:14px;
}

.summary td{
  border:none;
  border-bottom:2px solid #000;
  text-align:left;
  height:20px;
}

.loading{
  text-align:center;
  padding:30px;
  font-size:15px;
}

@media print{
  @page{
    size:A4 landscape;
    margin:4mm;
  }

  body{
    padding:0;
    zoom:0.72;
  }

  .nav-buttons{
    display:none;
  }

  .logo{
    height:42px;
  }

  table{
    page-break-inside:avoid;
  }
}
</style>
</head>

<body>

<img src="vitalis-logo.png" class="logo">

<div class="nav-buttons">
  <a href="index.html" class="nav-btn">Saldos</a>
  <a href="despesas.html" class="nav-btn">Mapa de Despesas</a>
  <a href="devedores.html" class="nav-btn active">Mapa de Devedores</a>
  <a href="erdm.html" class="nav-btn">Extrato ERDM</a>
</div>

<div class="title">MAPA DE DEVEDORES</div>
<div id="dataMapa" class="data"></div>

<div id="app" class="loading">A carregar mapa de devedores...</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=2114637149&single=true&output=csv";

function parseCSV(text){
  const rows=[];let row=[],cell="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c=='"'&&q&&n=='"'){cell+='"';i++}
    else if(c=='"'){q=!q}
    else if(c==","&&!q){row.push(cell.trim());cell=""}
    else if((c=="\n"||c=="\r")&&!q){
      if(cell!==""||row.length){row.push(cell.trim());rows.push(row);row=[];cell=""}
      if(c=="\r"&&n=="\n")i++;
    }else cell+=c;
  }
  if(cell!==""||row.length){row.push(cell.trim());rows.push(row)}
  return rows;
}

function clean(v){return v ? v.trim() : ""}

function findData(rows){
  for(const r of rows){
    const txt=r.join(" ").toUpperCase();
    if(txt.includes("DATA")){
      const found=r.find(c=>/\d{1,2}\/\d{1,2}\/\d{4}/.test(c));
      if(found) return "DATA: " + found;
      const joined=r.join(" ");
      const m=joined.match(/DATA[:\s]*([0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4})/i);
      if(m) return "DATA: " + m[1];
    }
  }
  return "";
}

function colorClass(value){
  if(!value) return "";
  if(value.trim()==="-") return "";
  const n=parseFloat(value.replace(/\./g,"").replace(",","."));
  if(isNaN(n)) return "";
  if(n >= 300000) return "green";
  if(n > 0 && n < 20000) return "red";
  return "";
}

function render(rows){
  let html=`
  <table>
    <colgroup>
      <col style="width:5%">
      <col style="width:15%">
      <col style="width:8%">
      <col style="width:9%">
      <col style="width:9%">
      <col style="width:9%">
      <col style="width:9%">
      <col style="width:8%">
      <col style="width:9%">
      <col style="width:11%">
      <col style="width:10%">
    </colgroup>
    <thead>
      <tr>
        <th>ITEM</th>
        <th>PERIODO</th>
        <th>60 Dias</th>
        <th>25-04-2026</th>
        <th>Piso</th>
        <th>25-05-2026</th>
        <th>PISO</th>
        <th>CORRENTE</th>
        <th>50% piso Abril</th>
        <th>TOTAL EM DÍVIDA</th>
        <th>TOTAL EM COBRANÇA</th>
      </tr>
      <tr>
        <th></th>
        <th>CLIENTE</th>
        <th>JANEIRO</th>
        <th>FEVEREIRO</th>
        <th></th>
        <th>MARÇO</th>
        <th></th>
        <th>ABRIL</th>
        <th>MAIO</th>
        <th></th>
        <th></th>
      </tr>
    </thead>
    <tbody>
  `;

  for(const r of rows){
    if(!r || r.every(c=>!c)) continue;

    const txt=r.join(" ").toUpperCase();

    if(txt.includes("MAPA DE DEVEDORES")) continue;
    if(txt.includes("DATA:")) continue;
    if(txt.includes("ITEM") && txt.includes("PERIODO")) continue;
    if(txt.includes("CLIENTE") && txt.includes("JANEIRO")) continue;
    if(txt.includes("TOTAL EM DÍVIDA") && r.length < 5) continue;
    if(txt.includes("TOTAL PIO")) continue;
    if(txt.includes("TOTAL VALOR EM COBRANÇA")) continue;
    if(txt.includes("TOTAL PISO EM COBRANÇA")) continue;

    const row=[
      clean(r[0]), clean(r[1]), clean(r[2]), clean(r[3]), clean(r[4]),
      clean(r[5]), clean(r[6]), clean(r[7]), clean(r[8]), clean(r[9]), clean(r[10])
    ];

    const isGroup=txt.includes("SEGURADORAS") || txt.includes("EMPRESAS PRIVADAS") || txt.includes("EMPRESAS PÚBLICAS") || txt.includes("EMPRESAS PUBLICAS");
    const isSubtotal=txt.includes("SUBTOTAL");
    const isTotal=txt.startsWith("TOTAL") || row[1].toUpperCase()==="TOTAL";

    let trClass="";
    if(isGroup) trClass="group-row";
    if(isSubtotal) trClass="subtotal-row";
    if(isTotal) trClass="total-row";

    html+=`<tr class="${trClass}">`;

    row.forEach((val,i)=>{
      let cls="";
      if(i===1) cls+=" left";
      if(isGroup || isSubtotal || isTotal) cls+=" bold";
      if(isGroup && i===1) cls+=" italic";
      cls+=" " + colorClass(val);
      html+=`<td class="${cls}">${val}</td>`;
    });

    html+=`</tr>`;
  }

  html+=`</tbody></table>`;
  return html;
}

function renderSummary(rows){
  let divida="", piso="", cobranca="", pisoCobranca="";

  for(const r of rows){
    const txt=r.join(" ").toUpperCase();
    const nums=r.filter(c=>/[0-9]/.test(c));
    if(txt.includes("TOTAL EM DÍVIDA") && nums.length) divida=nums[nums.length-1];
    if(txt.includes("TOTAL PIO") && nums.length) piso=nums[nums.length-1];
    if(txt.includes("TOTAL VALOR EM COBRANÇA") && nums.length) cobranca=nums[nums.length-1];
    if(txt.includes("TOTAL PISO EM COBRANÇA") && nums.length) pisoCobranca=nums[nums.length-1];
  }

  return `
  <table class="summary">
    <tr><td><b>TOTAL</b></td><td>EM DÍVIDA</td><td>${divida}</td></tr>
    <tr><td><b>TOTAL PIO</b></td><td></td><td>${piso}</td></tr>
    <tr><td><b>TOTAL</b></td><td>VALOR EM COBRANÇA</td><td>${cobranca}</td></tr>
    <tr><td><b>TOTAL PISO</b></td><td>EM COBRANÇA</td><td>${pisoCobranca}</td></tr>
  </table>`;
}

async function carregar(){
  const app=document.getElementById("app");
  try{
    const resp=await fetch(CSV_URL);
    const text=await resp.text();
    const rows=parseCSV(text);

    document.getElementById("dataMapa").innerText=findData(rows);

    app.className="";
    app.innerHTML=render(rows)+renderSummary(rows);

  }catch(e){
    app.innerHTML="Erro ao carregar mapa de devedores.";
    console.error(e);
  }
}

carregar();
</script>

</body>
</html>
