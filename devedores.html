<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa de Devedores</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#000;padding:8px;font-size:12px}
.logo{height:55px}
.nav-buttons{position:absolute;top:13px;left:540px;display:flex;gap:65px}
.nav-btn{min-width:130px;height:28px;padding:6px 14px;border:2px solid #e5392d;border-radius:6px;background:#fff;color:#000;text-decoration:none;font-size:11px;font-weight:bold;text-align:center}
.nav-btn:hover,.nav-btn.active{background:#e5392d;color:#fff}

.title{text-align:center;font-size:18px;font-weight:bold;margin-top:-10px}
.data{text-align:center;font-size:13px;font-weight:bold;margin:4px 0 10px}

table{border-collapse:collapse;table-layout:fixed}
.main-table{width:100%}
th,td{border:1px solid #000;padding:2px 3px;height:20px;text-align:center;vertical-align:middle;white-space:nowrap}
th{font-weight:bold}
.left{text-align:left}
.bold{font-weight:bold}
.italic{font-style:italic}
.green{color:#00b050}
.red{color:#c00000}

.group td,.subtotal td,.total td{font-weight:bold;border-top:2px solid #000;border-bottom:2px solid #000}
.group td:nth-child(2){font-style:italic;text-align:left}

.summary{width:390px;margin-top:16px;font-size:14px}
.summary td{border:none;border-bottom:2px solid #000;text-align:left;height:20px}

.loading{text-align:center;padding:30px;font-size:15px}

@media print{
  @page{size:A4 landscape;margin:4mm}
  body{padding:0;zoom:0.72}
  .nav-buttons{display:none}
  .logo{height:42px}
  table{page-break-inside:avoid}
}
</style>
</head>

<body>

<img src="vitalis-logo.png" class="logo">

<div class="nav-buttons">
  <a href="index.html" class="nav-btn">Saldos</a>
  <a href="despesas.html" class="nav-btn">Mapa de Despesas</a>
  <a href="devedores.html" class="nav-btn active">Mapa de Devedores</a>
  <a href="erdm.html" class="nav-btn">Extrato ERDM</a>
</div>

<div class="title">MAPA DE DEVEDORES</div>
<div id="dataMapa" class="data"></div>

<div id="app" class="loading">A carregar mapa de devedores...</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=2114637149&single=true&output=csv";

function parseCSV(text){
  const rows=[];let row=[],cell="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c=='"'&&q&&n=='"'){cell+='"';i++}
    else if(c=='"'){q=!q}
    else if(c==","&&!q){row.push(cell.trim());cell=""}
    else if((c=="\n"||c=="\r")&&!q){
      if(cell!==""||row.length){row.push(cell.trim());rows.push(row);row=[];cell=""}
      if(c=="\r"&&n=="\n")i++;
    }else cell+=c;
  }
  if(cell!==""||row.length){row.push(cell.trim());rows.push(row)}
  return rows;
}

function c(v){return v ? v.trim() : ""}
function rowText(r){return r.join(" ").toUpperCase()}

function getDate(rows){
  for(const r of rows){
    const txt=r.join(" ");
    const m=txt.match(/DATA[:\s]*([0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4})/i);
    if(m) return "DATA: " + m[1];
  }
  return "";
}

function clsValue(v){
  if(!v || v==="-" ) return "";
  const n=parseFloat(v.replace(/,/g,""));
  if(isNaN(n)) return "";
  if(n>=300000) return "green";
  if(n>0 && n<20000) return "red";
  return "";
}

function render(rows){
  let html=`
<table class="main-table">
<colgroup>
  <col style="width:5%">
  <col style="width:16%">
  <col style="width:8%">
  <col style="width:9%">
  <col style="width:8%">
  <col style="width:9%">
  <col style="width:8%">
  <col style="width:9%">
  <col style="width:9%">
  <col style="width:10%">
  <col style="width:10%">
</colgroup>

<thead>
<tr>
  <th>ITEM</th>
  <th>PERIODO</th>
  <th>60 Dias</th>
  <th>25-04-2026</th>
  <th>Piso</th>
  <th>25-05-2026</th>
  <th>PISO</th>
  <th>CORRENTE</th>
  <th>50% piso Abril</th>
  <th rowspan="2">TOTAL EM DÍVIDA</th>
  <th rowspan="2">TOTAL EM COBRANÇA</th>
</tr>
<tr>
  <th></th>
  <th>CLIENTE</th>
  <th>JANEIRO</th>
  <th>FEVEREIRO</th>
  <th></th>
  <th>MARÇO</th>
  <th></th>
  <th>ABRIL</th>
  <th>MAIO</th>
</tr>
</thead>
<tbody>
`;

  for(const r of rows){
    if(!r || r.every(x=>!x)) continue;

    const txt=rowText(r);

    if(txt.includes("MAPA DE DEVEDORES")) continue;
    if(txt.includes("DATA:")) continue;
    if(txt.includes("ITEM") && txt.includes("PERIODO")) continue;
    if(txt.includes("CLIENTE") && txt.includes("JANEIRO")) continue;

    if(txt.includes("TOTAL EM DÍVIDA") && r.length < 6) continue;
    if(txt.includes("TOTAL PIO")) continue;
    if(txt.includes("TOTAL VALOR EM COBRANÇA")) continue;
    if(txt.includes("TOTAL PISO EM COBRANÇA")) continue;

    // ⚠️ AQUI ESTÁ A CORREÇÃO IMPORTANTE
    const row = [];
    for(let i=0;i<11;i++){
      row.push(c(r[i] || ""));
    }

    const isGroup=txt.includes("SEGURADORAS")||txt.includes("EMPRESAS PRIVADAS")||txt.includes("EMPRESAS PÚBLICAS")||txt.includes("EMPRESAS PUBLICAS");
    const isSubtotal=txt.includes("SUBTOTAL");
    const isTotal=txt.startsWith("TOTAL ");

    let trClass="";
    if(isGroup) trClass="group";
    else if(isSubtotal) trClass="subtotal";
    else if(isTotal) trClass="total";

    html+=`<tr class="${trClass}">`;

    row.forEach((val,i)=>{
      let cl="";
      if(i===1) cl+=" left";
      if(isGroup||isSubtotal||isTotal) cl+=" bold";
      if(isGroup && i===1) cl+=" italic";
      cl+=" "+clsValue(val);

      html+=`<td class="${cl}">${val}</td>`;
    });

    html+=`</tr>`;
  }

  html+=`</tbody></table>`;
  return html;
}

function summary(rows){
  let divida="",pio="",cobranca="",pisoCob="";
  for(const r of rows){
    const txt=rowText(r);
    const nums=r.filter(x=>/[0-9]/.test(x));
    if(txt.includes("TOTAL EM DÍVIDA")) divida=nums[nums.length-1]||"";
    if(txt.includes("TOTAL PIO")) pio=nums[nums.length-1]||"";
    if(txt.includes("TOTAL VALOR EM COBRANÇA")) cobranca=nums[nums.length-1]||"";
    if(txt.includes("TOTAL PISO EM COBRANÇA")) pisoCob=nums[nums.length-1]||"";
  }
  return `
<table class="summary">
<tr><td><b>TOTAL</b></td><td>EM DÍVIDA</td><td>${divida}</td></tr>
<tr><td><b>TOTAL PIO</b></td><td></td><td>${pio}</td></tr>
<tr><td><b>TOTAL</b></td><td>VALOR EM COBRANÇA</td><td>${cobranca}</td></tr>
<tr><td><b>TOTAL PISO</b></td><td>EM COBRANÇA</td><td>${pisoCob}</td></tr>
</table>`;
}

async function carregar(){
  const app=document.getElementById("app");
  try{
    const resp=await fetch(CSV_URL);
    const text=await resp.text();
    const rows=parseCSV(text);
    document.getElementById("dataMapa").innerText=getDate(rows);
    app.className="";
    app.innerHTML=render(rows)+summary(rows);
  }catch(e){
    app.innerHTML="Erro ao carregar mapa de devedores.";
    console.error(e);
  }
}
carregar();
</script>

</body>
</html>
