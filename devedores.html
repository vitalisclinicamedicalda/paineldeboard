<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa de Devedores</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #fff;
  color: #000;
  padding: 8px;
}

.logo {
  height: 58px;
  margin-bottom: 2px;
}

.nav-buttons {
  position: absolute;
  top: 13px;
  left: 540px;
  display: flex;
  gap: 65px;
}

.nav-btn {
  min-width: 130px;
  height: 28px;
  padding: 6px 14px;
  border: 2px solid #e5392d;
  border-radius: 6px;
  background: #fff;
  color: #000;
  text-decoration: none;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
}

.nav-btn:hover,
.nav-btn.active {
  background: #e5392d;
  color: #fff;
}

.title {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.table-wrap {
  width: 100%;
  overflow: visible;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 12px;
}

th, td {
  border: 1px solid #000;
  padding: 2px 3px;
  text-align: center;
  vertical-align: middle;
  height: 20px;
  white-space: nowrap;
}

th {
  font-weight: bold;
}

.left {
  text-align: left;
}

.bold {
  font-weight: bold;
}

.italic {
  font-style: italic;
}

.green {
  color: #00b050;
}

.red {
  color: #c00000;
}

.subtotal td,
.total-row td {
  font-weight: bold;
  border-top: 2px solid #000;
  border-bottom: 2px solid #000;
}

.side-gap {
  border: none !important;
  width: 12px;
}

.bottom-summary {
  margin-top: 18px;
  width: 380px;
  font-size: 14px;
}

.bottom-summary td {
  border: none;
  border-bottom: 2px solid #000;
  height: 20px;
  text-align: left;
}

.loading {
  text-align: center;
  padding: 30px;
  font-size: 16px;
}

@media print {
  @page {
    size: A4 landscape;
    margin: 4mm;
  }

  body {
    padding: 0;
    zoom: 0.72;
  }

  .nav-buttons {
    display: none;
  }

  .logo {
    height: 45px;
  }

  table {
    page-break-inside: avoid;
  }

  .table-wrap {
    page-break-inside: avoid;
  }
}
</style>
</head>

<body>

<img src="vitalis-logo.png" class="logo">

<div class="nav-buttons">
  <a href="index.html" class="nav-btn">Saldos</a>
  <a href="despesas.html" class="nav-btn">Mapa de Despesas</a>
  <a href="devedores.html" class="nav-btn active">Mapa de Devedores</a>
  <a href="erdm.html" class="nav-btn">Extrato ERDM</a>
</div>

<div class="title">MAPA DE DEVEDORES</div>

<div id="app" class="loading">A carregar mapa de devedores...</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=2114637149&single=true&output=csv";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && insideQuotes && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      row.push(cell.trim());
      cell = "";
    } else if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (cell !== "" || row.length > 0) {
        row.push(cell.trim());
        rows.push(row);
        row = [];
        cell = "";
      }
      if (char === "\r" && next === "\n") i++;
    } else {
      cell += char;
    }
  }

  if (cell !== "" || row.length > 0) {
    row.push(cell.trim());
    rows.push(row);
  }

  return rows;
}

function clean(v) {
  return v ? v.trim() : "";
}

function isNumberValue(v) {
  return /[0-9]/.test(v || "");
}

function cellClass(value, rowText) {
  let cls = "";

  if (rowText.includes("SEGURADORAS") ||
      rowText.includes("EMPRESAS PRIVADAS") ||
      rowText.includes("EMPRESAS PÚBLICAS") ||
      rowText.includes("EMPRESAS PUBLICAS")) {
    cls += " bold italic";
  }

  if (value.includes("-")) cls += " bold";

  if (isNumberValue(value)) {
    const n = value.replace(/,/g, "");
    if (parseFloat(n) >= 300000) cls += " green";
  }

  return cls;
}

function renderTable(rows) {
  let html = `
  <div class="table-wrap">
  <table>
    <colgroup>
      <col style="width:5%;">
      <col style="width:12%;">
      <col style="width:10%;">
      <col style="width:10.5%;">
      <col style="width:9.5%;">
      <col style="width:11.7%;">
      <col style="width:9.8%;">
      <col style="width:10.8%;">
      <col style="width:7.8%;">
      <col style="width:10.8%;">
      <col style="width:1%;">
      <col style="width:13%;">
      <col style="width:11%;">
    </colgroup>
    <tbody>
  `;

  rows.forEach((r, index) => {
    if (!r || r.every(c => !c)) return;

    const rowText = r.join(" ").toUpperCase();

    if (rowText.includes("MAPA DE DEVEDORES")) return;

    const isHeader1 = rowText.includes("ITEM") && rowText.includes("PERIODO");
    const isHeader2 = rowText.includes("CLIENTE") && rowText.includes("JANEIRO");
    const isSubtotal = rowText.includes("SUBTOTAL");
    const isTotal = rowText.includes("TOTAL") && !rowText.includes("TOTAL EM");

    let trClass = "";
    if (isSubtotal) trClass = "subtotal";
    if (isTotal && !rowText.includes("VALOR EM COBRANÇA")) trClass = "total-row";

    html += `<tr class="${trClass}">`;

    for (let i = 0; i < 13; i++) {
      if (i === 10) {
        html += `<td class="side-gap"></td>`;
        continue;
      }

      const sourceIndex = i > 10 ? i - 1 : i;
      const value = clean(r[sourceIndex]);

      let cls = "";
      if (sourceIndex === 1) cls += " left";
      if (isHeader1 || isHeader2) cls += " bold";
      if (isSubtotal || isTotal) cls += " bold";
      cls += cellClass(value, rowText);

      html += `<td class="${cls}">${value}</td>`;
    }

    html += `</tr>`;
  });

  html += `
    </tbody>
  </table>
  </div>
  `;

  return html;
}

function renderBottomSummary(rows) {
  let valorCobranca = "";
  let valorPiso = "";

  rows.forEach(r => {
    const txt = r.join(" ").toUpperCase();
    if (txt.includes("VALOR EM COBRANÇA")) {
      valorCobranca = r.find(c => /[0-9]/.test(c)) || "";
    }
    if (txt.includes("PISO EM COBRANÇA")) {
      valorPiso = r.find(c => /[0-9]/.test(c)) || "";
    }
  });

  if (!valorCobranca && !valorPiso) return "";

  return `
  <table class="bottom-summary">
    <tr>
      <td><b>TOTAL</b></td>
      <td>VALOR EM COBRANÇA</td>
      <td>${valorCobranca}</td>
    </tr>
    <tr>
      <td><b>TOTAL PISO</b></td>
      <td>EM COBRANÇA</td>
      <td>${valorPiso}</td>
    </tr>
  </table>`;
}

async function carregarDevedores() {
  const app = document.getElementById("app");

  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error("Erro ao carregar Google Sheets");

    const text = await resp.text();
    const rows = parseCSV(text);

    app.className = "";
    app.innerHTML = renderTable(rows) + renderBottomSummary(rows);

  } catch (e) {
    app.innerHTML = "Erro ao carregar mapa de devedores. Verifique se o Google Sheet está publicado.";
    console.error(e);
  }
}

carregarDevedores();
</script>

</body>
</html>
