<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Saldos - Vitalis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body{
    margin:0;
    padding:8px;
    background:#fff;
    font-family:Arial, Helvetica, sans-serif;
    color:#000;
  }

  .sheet-wrap{
    width:100%;
    overflow:auto;
  }

  table{
    border-collapse:collapse;
    width:100%;
    min-width:1500px;
    table-layout:fixed;
    font-size:12px;
  }

  td, th{
    border:1px solid #000;
    padding:4px 5px;
    vertical-align:middle;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  th{
    font-weight:700;
    text-align:center;
    background:#f3f3f3;
  }

  .title-row td{
    text-align:center;
    font-weight:700;
    font-size:18px;
    background:#fff;
  }

  .section-title td{
    text-align:center;
    font-weight:700;
    font-size:16px;
    background:#fff;
  }

  .total-row td{
    background:#bfbfbf;
    font-weight:700;
  }

  .grand-total td{
    background:#fff;
    font-weight:700;
    font-size:14px;
  }

  .pos-total td{
    background:#fff;
    font-weight:700;
  }

  .number{
    text-align:right;
    font-style:italic;
    font-weight:700;
  }

  .center{text-align:center}
  .bold{font-weight:700}
  .red{color:red;font-weight:900;font-size:16px}

  .loading{
    font-weight:700;
    padding:14px;
  }

  @media print{
    body{padding:0}
    .sheet-wrap{overflow:visible}
    table{font-size:10px;min-width:0;width:100%}
    td,th{padding:3px}
  }
</style>
</head>
<body>
<div class="sheet-wrap">
  <div id="loading" class="loading">A carregar mapa de saldos...</div>
  <table id="tabela" style="display:none"></table>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=0&single=true&output=csv";

function cleanCell(value){
  return String(value ?? "").replace(/\u00a0/g," ").trim();
}

function isEmptyRow(row){
  return row.every(cell => cleanCell(cell) === "");
}

function rowText(row){
  return row.map(cleanCell).join(" ").toUpperCase();
}

function isNumberMoney(text){
  const s = cleanCell(text);
  return /\d/.test(s) && /(MZM|MT|MZN|,|\.)/.test(s);
}

function removeFullyEmptyColumns(rows){
  const maxCols = Math.max(...rows.map(r => r.length));
  const keep = [];
  for(let c=0;c<maxCols;c++){
    const hasValue = rows.some(r => cleanCell(r[c]) !== "");
    if(hasValue) keep.push(c);
  }
  return rows.map(r => keep.map(c => cleanCell(r[c])));
}

function professionalClean(data){
  let rows = data.map(r => r.map(cleanCell));

  // Começar na primeira linha útil do mapa, ignorando cabeçalhos externos do Google Sheets
  const startIndex = rows.findIndex(r => rowText(r).includes("MAPA DE SALDOS - VITALIS"));
  if(startIndex > -1) rows = rows.slice(startIndex);
  else {
    const itemIndex = rows.findIndex(r => r.some(c => cleanCell(c).toUpperCase() === "ITEM"));
    rows = rows.slice(itemIndex > -1 ? itemIndex : 7);
  }

  // Remover linhas totalmente vazias no início/fim e linhas mortas excessivas
  rows = rows.filter(r => !isEmptyRow(r));

  // Remover colunas completamente vazias
  rows = removeFullyEmptyColumns(rows);

  return rows;
}

function styleRow(tr, row){
  const text = rowText(row);

  if(text.includes("MAPA DE SALDOS - VITALIS")) tr.classList.add("title-row");
  if(text.includes("MAPA DE SALDOS - COOPMED") || text.includes("CONTROLE DO DESCONTO DO POS")) tr.classList.add("section-title");
  if(text.includes("TOTAL MZN-")) tr.classList.add("total-row");
  if(text.includes("TOTAL DO SALDO DA EMPRESA")) tr.classList.add("grand-total");
  if(text.includes("REMANESCENTE") || text.includes("DESCONTO DE POS")) tr.classList.add("pos-total");
}

function renderTable(rows){
  const table = document.getElementById("tabela");
  table.innerHTML = "";

  rows.forEach((row, rowIndex) => {
    const tr = document.createElement("tr");
    styleRow(tr, row);

    row.forEach((cell, colIndex) => {
      const isHeader = row.some(c => cleanCell(c).toUpperCase() === "ITEM") || rowIndex === 0;
      const el = document.createElement(isHeader ? "th" : "td");
      el.textContent = cell;

      const upper = cleanCell(cell).toUpperCase();
      if(isNumberMoney(cell)) el.classList.add("number");
      if(["ITEM","BANCO","CENTRO DE CUSTO","RESPONSAVEL DA CONTA","OBS","DEFICE"].includes(upper)) el.classList.add("center");
      if(upper.includes("548,743.60")) el.classList.add("red");

      tr.appendChild(el);
    });

    table.appendChild(tr);
  });

  document.getElementById("loading").style.display = "none";
  table.style.display = "table";
}

Papa.parse(URL, {
  download:true,
  header:false,
  skipEmptyLines:false,
  complete:function(results){
    const rows = professionalClean(results.data || []);
    renderTable(rows);
  },
  error:function(){
    document.getElementById("loading").textContent = "Erro ao carregar dados do Google Sheets.";
  }
});
</script>
</body>
</html>
