<script>


function isNumericText(value){
  const s = String(value ?? "").trim();
  if(!s) return false;
  if(/[A-Za-z]/.test(s) && !/(MT|MZN|USD|EUR|MZN-)/i.test(s)) return false;
  return /\d/.test(s);
}

function rowText(row){
  return row.map(x => String(x ?? "").trim()).filter(Boolean).join(" ").toUpperCase();
}

function isTotalRow(row){
  const text = rowText(row).replace(/\s+/g, " ");
  return (
    /\bTOTAL\b/.test(text) ||
    text.includes("TOTAL MZN") ||
    text.includes("MZN-MOZA") ||
    text.includes("MZN - MOZA") ||
    text.includes("TOTAL DO SALDO DA EMPRESA") ||
    text.includes("TOTAL SALDO DA EMPRESA") ||
    text.includes("SALDO DA EMPRESA")
  );
}

function isGrandTotalRow(row){
  const text = rowText(row).replace(/\s+/g, " ");
  return (
    text.includes("TOTAL GERAL") ||
    text.includes("TOTAL DOS SALDOS") ||
    text.includes("TOTAL DO SALDO DA EMPRESA") ||
    text.includes("TOTAL SALDO DA EMPRESA") ||
    text === "TOTAL"
  );
}

function isSectionTitleRow(row){
  const text = rowText(row).replace(/\s+/g, " ");
  return (
    text.includes("MAPA DE SALDOS - COOPMED") ||
    text.includes("MAPA DE SALDOS-COOPMED") ||
    text.includes("CONTROLE DE DESCONTO DE POS") ||
    text.includes("CONTROLO DE DESCONTO DE POS") ||
    text.includes("CONTROLE DE DESCONTO POS") ||
    text.includes("CONTROLO DE DESCONTO POS")
  );
}

function cleanVisibleRows(data){
  const startIndex = data.findIndex(row =>
    row.some(cell => String(cell ?? "").toUpperCase().includes("ITEM"))
  );
  const finalStart = startIndex !== -1 ? startIndex : 7;

  let rows = data.slice(finalStart)
    .map(row => row.map(cell => String(cell ?? "").trim()))
    .filter(row => row.some(cell => cell !== ""))
    .map(row => {
      let last = row.length - 1;
      while(last >= 0 && row[last] === "") last--;
      return row.slice(0, last + 1);
    });

  // Remove a primeira linha visível do painel
  if(rows.length > 0){
    rows = rows.slice(1);
  }

  return rows;
}

function addSectionTitle(table, title, colCount){
  const blank = document.createElement("tr");
  blank.className = "blank-row";
  const blankTd = document.createElement("td");
  blankTd.colSpan = colCount;
  blankTd.innerHTML = "&nbsp;";
  blank.appendChild(blankTd);
  table.appendChild(blank);

  const tr = document.createElement("tr");
  tr.className = "section-title-row";
  const td = document.createElement("td");
  td.colSpan = colCount;
  td.innerText = title;
  tr.appendChild(td);
  table.appendChild(tr);
}

function renderFinancialTable(data){
  const table = document.getElementById("tabela");
  table.innerHTML = "";

  const rows = cleanVisibleRows(data);
  if(!rows.length){
    table.innerHTML = "<tr><td>Sem dados encontrados.</td></tr>";
    return;
  }

  const colCount = Math.max(...rows.map(r => r.length), 6);
  const colgroup = document.createElement("colgroup");
  for(let i=0;i<colCount;i++){
    const col = document.createElement("col");
    if(i === 0) col.style.width = "6%";        // ITEM
    else if(i === colCount-1) col.style.width = "14%"; // valores
    else col.style.width = ((80/(colCount-2)) || 12) + "%";
    colgroup.appendChild(col);
  }
  table.appendChild(colgroup);

  rows.forEach((originalRow, index) => {
    let row = [...originalRow];
    while(row.length < colCount) row.push("");

    const text = rowText(row).replace(/\s+/g, " ");

    // Secções especiais: uma linha em branco antes + título centralizado
    if(isSectionTitleRow(row)){
      let title = text.includes("COOPMED") ? "MAPA DE SALDOS - COOPMED" : "CONTROLE DE DESCONTO DE POS";
      addSectionTitle(table, title, colCount);
      return;
    }

    const tr = document.createElement("tr");

    // Cabeçalho
    const isHeader = index === 0 || row.some(cell => String(cell).toUpperCase().trim() === "ITEM");

    if(isTotalRow(row) && !isHeader){
      tr.className = isGrandTotalRow(row) ? "grand-total-row" : "total-row";

      // Label: captura a expressão que contém TOTAL; inclui casos MZN-MOZA e saldo da empresa
      let totalLabel = row.find(cell => String(cell).toUpperCase().includes("TOTAL")) || "";
      if(!totalLabel){
        totalLabel = text.includes("MZN-MOZA") || text.includes("MZN - MOZA") ? "TOTAL MZN-MOZA" : "TOTAL";
      }
      if(text.includes("TOTAL DO SALDO DA EMPRESA") || text.includes("TOTAL SALDO DA EMPRESA")){
        totalLabel = "TOTAL DO SALDO DA EMPRESA";
      }

      // Valor: último número visível da linha
      let valueIndex = -1;
      for(let i = row.length - 1; i >= 0; i--){
        if(isNumericText(row[i])){
          valueIndex = i;
          break;
        }
      }
      const value = valueIndex >= 0 ? row[valueIndex] : "";

      // MERGE REAL: TOTAL ocupa da coluna ITEM até à coluna anterior ao valor
      const tdLabel = document.createElement("td");
      tdLabel.colSpan = colCount - 1;
      tdLabel.innerText = totalLabel;
      tdLabel.className = "total-label";

      const tdValue = document.createElement("td");
      tdValue.innerText = value;
      tdValue.className = "numeric";

      tr.appendChild(tdLabel);
      tr.appendChild(tdValue);
      table.appendChild(tr);

      // Após TOTAL DO SALDO DA EMPRESA, deixa linha em branco.
      // O título COOPMED entra centralizado quando for encontrado no sheet.
      if(text.includes("TOTAL DO SALDO DA EMPRESA") || text.includes("TOTAL SALDO DA EMPRESA")){
        const blank = document.createElement("tr");
        blank.className = "blank-row";
        const td = document.createElement("td");
        td.colSpan = colCount;
        td.innerHTML = "&nbsp;";
        blank.appendChild(td);
        table.appendChild(blank);
      }

      return;
    }

    row.forEach((cell, i) => {
      const td = document.createElement(isHeader ? "th" : "td");
      td.innerText = cell;

      const key = String(cell).trim().toUpperCase();
      if(!isHeader && isNumericText(cell)) td.classList.add("numeric");
      if(!isHeader && (key === "-" || key === "SIM" || key === "NÃO" || key === "NAO")) td.classList.add("center");

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}

Papa.parse(URL, {
  download:true,
  header:false,
  skipEmptyLines:false,
  complete:function(results){
    const rows = professionalClean(results.data || []);
    renderTable(rows);
  },
  error:function(){
    document.getElementById("loading").textContent = "Erro ao carregar dados do Google Sheets.";
  }
});
</script>
