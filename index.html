<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAPA DE SALDOS - VITALIS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --grid:#000;
    --header:#d9e1f2;
    --gray:#bfbfbf;
    --light-gray:#f2f2f2;
    --yellow:#fff2cc;
    --green:#e2f0d9;
    --red:#ff0000;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    padding:10px;
    background:#fff;
    font-family:Arial, Helvetica, sans-serif;
    color:#000;
  }
  .sheet-wrap{width:100%;overflow:auto;background:#fff}
  table{
    border-collapse:collapse;
    width:100%;
    min-width:1580px;
    table-layout:fixed;
    font-size:12px;
  }
  td,th{
    border:1px solid var(--grid);
    padding:4px 5px;
    height:24px;
    vertical-align:middle;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.15;
  }
  th{
    background:var(--header);
    font-weight:700;
    text-align:center;
  }
  .merged-title td,
  .merged-title th{
    text-align:center!important;
    font-weight:700;
    font-size:18px;
    height:30px;
    background:#fff;
  }
  .merged-section td,
  .merged-section th{
    text-align:center!important;
    font-weight:700;
    font-size:15px;
    height:28px;
    background:#fff;
  }
  .table-head th{
    background:var(--header);
    font-weight:700;
    text-align:center;
  }
  .total-row td{background:var(--gray);font-weight:700}
  .grand-total td{background:#fff;font-weight:700;font-size:14px}
  .pos-row td{background:#fff;font-weight:700}
  .number{text-align:right!important;font-style:italic;font-weight:700}
  .center{text-align:center!important}
  .bold{font-weight:700}
  .red{color:var(--red)!important;font-weight:900!important;font-size:16px!important}
  .loading{font-weight:700;padding:14px}

  col.c1{width:54px}
  col.c2{width:130px}
  col.c3{width:170px}
  col.c4{width:170px}
  col.c5{width:145px}
  col.c6{width:160px}
  col.c7{width:160px}
  col.c8{width:150px}
  col.c9{width:160px}
  col.c10{width:130px}
  col.c11{width:130px}
  col.c12{width:130px}
  col.c13{width:130px}
  col.c14{width:140px}
  col.c15{width:110px}

  @media print{
    body{padding:0}
    .sheet-wrap{overflow:visible}
    table{font-size:9px;min-width:0;width:100%}
    td,th{padding:2px;height:18px}
  }
</style>
</head>
<body>
<div class="sheet-wrap">
  <div id="loading" class="loading">A carregar mapa de saldos...</div>
  <table id="tabela" style="display:none"></table>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=0&single=true&output=csv";

function cleanCell(value){
  return String(value ?? "").replace(/\u00a0/g," ").trim();
}
function rowText(row){
  return row.map(cleanCell).join(" ").replace(/\s+/g," ").trim().toUpperCase();
}
function isEmptyRow(row){
  return row.every(cell => cleanCell(cell) === "");
}
function normalize(v){
  return cleanCell(v).toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function isNumberMoney(text){
  const s = cleanCell(text);
  return /\d/.test(s) && (/\d+[,.]\d{2}/.test(s) || /(MZN|MZM|MT)/i.test(s));
}
function removeFullyEmptyColumns(rows){
  const maxCols = Math.max(1,...rows.map(r => r.length));
  const keep = [];
  for(let c=0;c<maxCols;c++){
    if(rows.some(r => cleanCell(r[c]) !== "")) keep.push(c);
  }
  return rows.map(r => keep.map(c => cleanCell(r[c])));
}
function professionalClean(data){
  let rows = data.map(r => r.map(cleanCell));

  // Começa no título real do mapa. Se não encontrar, começa no cabeçalho ITEM.
  const titleIndex = rows.findIndex(r => rowText(r).includes("MAPA DE SALDOS - VITALIS"));
  if(titleIndex >= 0) rows = rows.slice(titleIndex);
  else {
    const itemIndex = rows.findIndex(r => r.some(c => normalize(c) === "ITEM"));
    rows = rows.slice(itemIndex >= 0 ? itemIndex : 7);
  }

  // Remove linhas totalmente vazias e colunas vazias para ficar limpo no painel.
  rows = rows.filter(r => !isEmptyRow(r));
  rows = removeFullyEmptyColumns(rows);

  return rows;
}
function isTitleRow(row){
  return rowText(row).includes("MAPA DE SALDOS - VITALIS");
}
function isSectionRow(row){
  const text = rowText(row);
  return text.includes("MAPA DE SALDOS - COOPMED") || text.includes("CONTROLE DO DESCONTO DO POS");
}
function isHeaderRow(row){
  const values = row.map(normalize);
  return values.includes("ITEM") || values.includes("BANCO") || values.includes("CENTRO DE CUSTO");
}
function isTotalRow(row){
  const text = rowText(row);
  return text.includes("TOTAL MZN-") || text.includes("TOTAL MZN") || text.includes("TOTAL USD") || text.includes("TOTAL ZAR");
}
function isGrandTotalRow(row){
  const text = rowText(row);
  return text.includes("TOTAL DO SALDO DA EMPRESA");
}
function isPosRow(row){
  const text = rowText(row);
  return text.includes("REMANESCENTE") || text.includes("DESCONTO DE POS") || text.includes("POS");
}
function isSingleTextRow(row){
  const nonEmpty = row.filter(c => cleanCell(c) !== "");
  return nonEmpty.length === 1;
}
function addCols(table, colCount){
  const group = document.createElement("colgroup");
  for(let i=1;i<=colCount;i++){
    const col = document.createElement("col");
    col.className = `c${i}`;
    group.appendChild(col);
  }
  table.appendChild(group);
}
function renderMergedRow(table,row,className,colCount){
  const tr = document.createElement("tr");
  tr.className = className;
  const td = document.createElement("td");
  td.colSpan = colCount;
  td.textContent = row.filter(c => cleanCell(c) !== "").join(" ");
  tr.appendChild(td);
  table.appendChild(tr);
}
function renderTable(rows){
  const table = document.getElementById("tabela");
  table.innerHTML = "";
  const colCount = Math.max(1,...rows.map(r => r.length));
  addCols(table,colCount);

  rows.forEach((row) => {
    if(isTitleRow(row)){
      renderMergedRow(table,row,"merged-title",colCount);
      return;
    }
    if(isSectionRow(row) || isSingleTextRow(row)){
      renderMergedRow(table,row,"merged-section",colCount);
      return;
    }

    const tr = document.createElement("tr");
    if(isHeaderRow(row)) tr.classList.add("table-head");
    if(isTotalRow(row)) tr.classList.add("total-row");
    if(isGrandTotalRow(row)) tr.classList.add("grand-total");
    if(isPosRow(row)) tr.classList.add("pos-row");

    const useTh = isHeaderRow(row);
    for(let i=0;i<colCount;i++){
      const cell = row[i] ?? "";
      const el = document.createElement(useTh ? "th" : "td");
      el.textContent = cleanCell(cell);

      const upper = normalize(cell);
      if(isNumberMoney(cell)) el.classList.add("number");
      if(["ITEM","BANCO","CENTRO DE CUSTO","RESPONSAVEL DA CONTA","OBS","DEFICE","STATUS"].includes(upper)) el.classList.add("center");
      if(upper.includes("548,743.60") || upper.includes("548.743,60")) el.classList.add("red");
      if(upper.includes("TOTAL") || upper.includes("MZN-") || upper.includes("USD") || upper.includes("ZAR")) el.classList.add("bold");

      tr.appendChild(el);
    }
    table.appendChild(tr);
  });

  document.getElementById("loading").style.display = "none";
  table.style.display = "table";
}
Papa.parse(URL,{
  download:true,
  header:false,
  skipEmptyLines:false,
  complete:function(results){
    const rows = professionalClean(results.data || []);
    renderTable(rows);
  },
  error:function(){
    document.getElementById("loading").textContent = "Erro ao carregar dados do Google Sheets.";
  }
});
</script>
</body>
</html>
