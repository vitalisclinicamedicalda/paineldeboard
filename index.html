<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Saldos - Vitalis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body{
    margin:0;
    padding:8px;
    background:#fff;
    font-family:Arial, Helvetica, sans-serif;
    color:#000;
  }

  .sheet-wrap{
    width:100%;
    overflow:auto;
  }

  table{
    border-collapse:collapse;
    width:100%;
    min-width:1500px;
    table-layout:fixed;
    font-size:12px;
  }

  td, th{
    border:1px solid #000;
    padding:4px 5px;
    vertical-align:middle;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  th{
    font-weight:700;
    text-align:center;
    background:#f3f3f3;
  }

  .title-row td{
    text-align:center;
    font-weight:700;
    font-size:18px;
    background:#fff;
  }

  .section-title td{
    text-align:center;
    font-weight:700;
    font-size:16px;
    background:#fff;
  }

  .total-row td{
    background:#bfbfbf;
    font-weight:700;
  }

  .grand-total td{
    background:#fff;
    font-weight:700;
    font-size:14px;
  }

  .pos-total td{
    background:#fff;
    font-weight:700;
  }

  .number{
    text-align:right;
    font-style:italic;
    font-weight:700;
  }

  .center{text-align:center}
  .bold{font-weight:700}
  .red{color:red;font-weight:900;font-size:16px}

  .loading{
    font-weight:700;
    padding:14px;
  }

  @media print{
    body{padding:0}
    .sheet-wrap{overflow:visible}
    table{font-size:10px;min-width:0;width:100%}
    td,th{padding:3px}
  }

.executive-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  min-height:95px;
  padding:18px 6px 16px;
  border-bottom:3px solid #b90f0a;
  margin-bottom:18px;
}
.executive-header .logo-box{
  flex:0 0 260px;
  display:flex;
  align-items:center;
}
.executive-header img{
  height:72px;
  max-width:250px;
  object-fit:contain;
}
.executive-header .title-box{
  flex:1;
  text-align:center;
}
.executive-header .title-box h1{
  margin:0;
  font-size:24px;
  font-weight:800;
  letter-spacing:.04em;
  color:#111;
}
.executive-header .title-box .subtitle{
  margin-top:6px;
  font-size:12px;
  font-weight:700;
  color:#555;
  letter-spacing:.08em;
}
.executive-header .right-box{
  flex:0 0 260px;
  text-align:right;
  font-size:12px;
  color:#555;
  font-weight:700;
}
@media(max-width:760px){
  .executive-header{
    display:block;
    text-align:center;
  }
  .executive-header .logo-box,
  .executive-header .right-box{
    flex:auto;
    justify-content:center;
    text-align:center;
    margin-bottom:10px;
  }
  .executive-header img{height:62px;}
}


/* ===== NÍVEL RELATÓRIO FINANCEIRO ===== */
body{
  background:#ffffff !important;
}
.report-shell{
  max-width:1280px;
  margin:0 auto;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:auto;
  background:#fff;
}
th,td{
  border:1px solid #111 !important;
  padding:6px 8px !important;
  font-size:12px;
  vertical-align:middle;
}
th{
  background:#e9eef2 !important;
  color:#111 !important;
  text-align:center !important;
  font-weight:800 !important;
}
td{
  color:#111 !important;
}
td.numeric{
  text-align:right !important;
  font-weight:700;
  white-space:nowrap;
}
td.center{
  text-align:center !important;
}
tr.total-row td{
  background:#f1f1f1 !important;
  font-weight:900 !important;
  border-top:2.5px solid #000 !important;
  border-bottom:2.5px solid #000 !important;
}
tr.grand-total-row td{
  background:#d9ead3 !important;
  font-weight:950 !important;
  border-top:3px solid #000 !important;
  border-bottom:3px solid #000 !important;
}
td.total-label{
  text-align:center !important;
  letter-spacing:.04em;
}
.print-actions{
  display:flex;
  justify-content:flex-end;
  margin:10px 0 14px;
}
.print-btn{
  border:1px solid #b90f0a;
  background:#b90f0a;
  color:white;
  border-radius:8px;
  padding:9px 14px;
  font-weight:800;
  cursor:pointer;
}
@media print{
  .print-actions{display:none !important;}
  .executive-header{
    border-bottom:2px solid #000 !important;
    margin-bottom:12px !important;
  }
  body{padding:0 !important;}
  table{page-break-inside:auto;}
  tr{page-break-inside:avoid;page-break-after:auto;}
  th{background:#e9eef2 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  tr.total-row td, tr.grand-total-row td{
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
}

</style>
</head>
<body>
<div class="report-shell">
<div class="executive-header">
  <div class="logo-box">
    <img src="vitalis-logo.png" alt="Vitalis Clínica Médica">
  </div>
  <div class="title-box">
    <h1>MAPA DE SALDOS - VITALIS</h1>
    <div class="subtitle">CONTROLO FINANCEIRO</div>
  </div>
  <div class="right-box">
    Dados do Google Sheets<br>
    Actualização automática
  </div>
</div>

<div class="sheet-wrap">
  <div id="loading" class="loading">A carregar mapa de saldos...</div>
  <div class="print-actions"><button class="print-btn" onclick="window.print()">Imprimir / Guardar PDF</button></div>
<table id="tabela" style="display:none"></table>
</div>

<script>

function isNumericText(value){
  const s = String(value ?? "").trim();
  if(!s) return false;
  if(/[A-Za-z]/.test(s) && !/(MT|MZN|USD|EUR)/i.test(s)) return false;
  return /\d/.test(s);
}

function isTotalRow(row){
  const text = row.join(" ").toUpperCase();
  return /\bTOTAL\b/.test(text);
}

function isGrandTotalRow(row){
  const text = row.join(" ").toUpperCase();
  return text.includes("TOTAL GERAL") || text.includes("TOTAL DOS SALDOS") || text.trim() === "TOTAL";
}

function cleanVisibleRows(data){
  const startIndex = data.findIndex(row =>
    row.some(cell => String(cell ?? "").toUpperCase().includes("ITEM"))
  );
  const finalStart = startIndex !== -1 ? startIndex : 7;

  return data.slice(finalStart)
    .map(row => row.map(cell => String(cell ?? "").trim()))
    .filter(row => row.some(cell => cell !== ""))
    .map(row => {
      let last = row.length - 1;
      while(last >= 0 && row[last] === "") last--;
      return row.slice(0, last + 1);
    });
}

function renderFinancialTable(data){
  const table = document.getElementById("tabela");
  table.innerHTML = "";

  const rows = cleanVisibleRows(data);
  if(!rows.length){
    table.innerHTML = "<tr><td>Sem dados encontrados.</td></tr>";
    return;
  }

  rows.forEach((row, index) => {
    const tr = document.createElement("tr");
    const upper = row.join(" ").toUpperCase();

    // Título dentro da tabela, caso exista
    if(upper.includes("MAPA DE SALDOS")){
      const td = document.createElement("td");
      td.colSpan = Math.max(row.length, 6);
      td.innerText = row.filter(Boolean).join(" ");
      td.className = "total-label";
      td.style.fontSize = "16px";
      td.style.fontWeight = "900";
      td.style.textAlign = "center";
      tr.appendChild(td);
      table.appendChild(tr);
      return;
    }

    // Cabeçalho
    const isHeader = index === 0 || row.some(cell => String(cell).toUpperCase().trim() === "ITEM");

    if(isTotalRow(row) && !isHeader){
      tr.className = isGrandTotalRow(row) ? "grand-total-row" : "total-row";

      const valueIndex = (() => {
        for(let i = row.length - 1; i >= 0; i--){
          if(isNumericText(row[i])) return i;
        }
        return row.length - 1;
      })();

      const label = row.find(cell => String(cell).toUpperCase().includes("TOTAL")) || "TOTAL";
      const value = row[valueIndex] || "";

      const tdLabel = document.createElement("td");
      tdLabel.colSpan = Math.max(valueIndex, row.length - 1);
      tdLabel.innerText = label;
      tdLabel.className = "total-label";

      const tdValue = document.createElement("td");
      tdValue.innerText = value;
      tdValue.className = "numeric";

      tr.appendChild(tdLabel);
      tr.appendChild(tdValue);
      table.appendChild(tr);
      return;
    }

    row.forEach((cell, i) => {
      const td = document.createElement(isHeader ? "th" : "td");
      td.innerText = cell;

      const key = String(cell).trim().toUpperCase();
      if(!isHeader && isNumericText(cell)) td.classList.add("numeric");
      if(!isHeader && (key === "-" || key === "SIM" || key === "NÃO" || key === "NAO")) td.classList.add("center");

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}


const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=0&single=true&output=csv";

function cleanCell(value){
  return String(value ?? "").replace(/\u00a0/g," ").trim();
}

function isEmptyRow(row){
  return row.every(cell => cleanCell(cell) === "");
}

function rowText(row){
  return row.map(cleanCell).join(" ").toUpperCase();
}

function isNumberMoney(text){
  const s = cleanCell(text);
  return /\d/.test(s) && /(MZM|MT|MZN|,|\.)/.test(s);
}

function removeFullyEmptyColumns(rows){
  const maxCols = Math.max(...rows.map(r => r.length));
  const keep = [];
  for(let c=0;c<maxCols;c++){
    const hasValue = rows.some(r => cleanCell(r[c]) !== "");
    if(hasValue) keep.push(c);
  }
  return rows.map(r => keep.map(c => cleanCell(r[c])));
}

function professionalClean(data){
  let rows = data.map(r => r.map(cleanCell));

  // Começar na primeira linha útil do mapa, ignorando cabeçalhos externos do Google Sheets
  const startIndex = rows.findIndex(r => rowText(r).includes("MAPA DE SALDOS - VITALIS"));
  if(startIndex > -1) rows = rows.slice(startIndex);
  else {
    const itemIndex = rows.findIndex(r => r.some(c => cleanCell(c).toUpperCase() === "ITEM"));
    rows = rows.slice(itemIndex > -1 ? itemIndex : 7);
  }

  // Remover linhas totalmente vazias no início/fim e linhas mortas excessivas
  rows = rows.filter(r => !isEmptyRow(r));

  // Remover colunas completamente vazias
  rows = removeFullyEmptyColumns(rows);

  return rows;
}

function styleRow(tr, row){
  const text = rowText(row);

  if(text.includes("MAPA DE SALDOS - VITALIS")) tr.classList.add("title-row");
  if(text.includes("MAPA DE SALDOS - COOPMED") || text.includes("CONTROLE DO DESCONTO DO POS")) tr.classList.add("section-title");
  if(text.includes("TOTAL MZN-")) tr.classList.add("total-row");
  if(text.includes("TOTAL DO SALDO DA EMPRESA")) tr.classList.add("grand-total");
  if(text.includes("REMANESCENTE") || text.includes("DESCONTO DE POS")) tr.classList.add("pos-total");
}

function renderTable(rows){
  const table = document.getElementById("tabela");
  table.innerHTML = "";

  rows.forEach((row, rowIndex) => {
    const tr = document.createElement("tr");
    styleRow(tr, row);

    row.forEach((cell, colIndex) => {
      const isHeader = row.some(c => cleanCell(c).toUpperCase() === "ITEM") || rowIndex === 0;
      const el = document.createElement(isHeader ? "th" : "td");
      el.textContent = cell;

      const upper = cleanCell(cell).toUpperCase();
      if(isNumberMoney(cell)) el.classList.add("number");
      if(["ITEM","BANCO","CENTRO DE CUSTO","RESPONSAVEL DA CONTA","OBS","DEFICE"].includes(upper)) el.classList.add("center");
      if(upper.includes("548,743.60")) el.classList.add("red");

      tr.appendChild(el);
    });

    table.appendChild(tr);
  });

  document.getElementById("loading").style.display = "none";
  table.style.display = "table";
}

Papa.parse(URL, {
  download:true,
  header:false,
  skipEmptyLines:false,
  complete:function(results){
    const rows = professionalClean(results.data || []);
    renderTable(rows);
  },
  error:function(){
    document.getElementById("loading").textContent = "Erro ao carregar dados do Google Sheets.";
  }
});
</script>
</div>
</body>
</html>
