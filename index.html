<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa de Saldos - Vitalis</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
}

td, th {
    border: 1px solid #000;
    padding: 4px;
    text-align: left;
}

th {
    background: #f2f2f2;
    font-weight: bold;
}

.title {
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    margin: 10px 0;
}
</style>

</head>

<body>

<div class="title">MAPA DE SALDOS - VITALIS</div>

<table id="tabela"></table>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=0&single=true&output=csv";

Papa.parse(URL, {
    download: true,
    complete: function(results) {

        const data = results.data;
        const table = document.getElementById("tabela");

        data.forEach((row, index) => {

            const tr = document.createElement("tr");

            row.forEach(cell => {

                const td = document.createElement(index === 0 ? "th" : "td");
                td.innerText = cell;

                tr.appendChild(td);
            });

            table.appendChild(tr);
        });

    }
});
</script>

</body>
</html>
