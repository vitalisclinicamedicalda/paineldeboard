<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Saldos - Vitalis</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:3px solid #b90f0a;
  padding:10px;
}

.logo{
  height:60px;
}

.title{
  text-align:center;
  font-weight:bold;
  font-size:20px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td{
  border:1px solid #000;
  padding:4px;
  font-size:11px;
}

th{
  background:#e9eef2;
  text-align:center;
}

.numeric{
  text-align:right;
  font-weight:bold;
}

/* TOTAIS */
.total{
  background:#f1f1f1;
  font-weight:bold;
  border-top:2px solid #000;
  border-bottom:2px solid #000;
}

.grand{
  background:#d9ead3;
  font-weight:bold;
  border-top:3px solid #000;
  border-bottom:3px solid #000;
}

.total-label{
  text-align:center;
}

/* PRINT */
@page{
  size:A4 landscape;
}

@media print{
  body{
    zoom:0.75;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="vitalis-logo.png" class="logo">
  <div class="title">MAPA DE SALDOS - VITALIS</div>
  <div></div>
</div>

<table id="tabela"></table>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLUDSFALaFHQlkwlvXZT8UrwohxbgrHC99Evm1_MopNIRfRvjFgaeFjdQqE85IdYZiUIEY5gBQKl5w/pub?gid=0&single=true&output=csv";

function parseCSV(text){
  return text.split("\n").map(l => l.split(","));
}

function isTotal(row){
  const txt = row.join(" ").toUpperCase();
  return txt.includes("TOTAL");
}

function isGrand(row){
  const txt = row.join(" ").toUpperCase();
  return txt.includes("TOTAL DO SALDO");
}

fetch(URL)
.then(r=>r.text())
.then(text=>{
  const data = parseCSV(text);

  const table = document.getElementById("tabela");

  // encontrar inicio
  let start = data.findIndex(r => r.includes("ITEM"));
  if(start < 0) start = 7;

  data.slice(start).forEach((row, idx)=>{

    if(row.every(c => !c)) return;

    const tr = document.createElement("tr");

    if(isTotal(row)){
      const label = row.find(c => c && c.toUpperCase().includes("TOTAL")) || "TOTAL";
      const value = row.reverse().find(c => c && c.match(/\d/)) || "";

      const td1 = document.createElement("td");
      td1.colSpan = row.length - 1;
      td1.innerText = label;
      td1.className = "total-label";

      const td2 = document.createElement("td");
      td2.innerText = value;
      td2.className = "numeric";

      tr.appendChild(td1);
      tr.appendChild(td2);

      tr.className = isGrand(row) ? "grand" : "total";

      table.appendChild(tr);
      return;
    }

    row.forEach((cell,i)=>{
      if(String(cell).toUpperCase().includes("OBS")) return;

      const td = document.createElement(idx==0?"th":"td");
      td.innerText = cell;

      if(cell && cell.match(/\d/)) td.className="numeric";

      tr.appendChild(td);
    });

    table.appendChild(tr);

  });

})
.catch(()=>alert("Erro ao carregar dados"));

</script>

</body>
</html>
